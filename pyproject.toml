[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = ["scripts", "mcp"]
addopts = "-ra --strict-markers"

[tool.coverage.run]
source = ["scripts", "mcp"]
omit = [
    "tests/*",
    "scripts/lib_loader.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["scripts", "mcp", "tests"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear (common bugs)
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific
]
ignore = [
    "E501",   # line too long — formatter handles
    "B008",   # function call in default arg (pytest fixtures do this)
    "SIM108", # ternary over if/else — not always clearer
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts in tests are fine

[tool.mypy]
python_version = "3.10"
files = ["scripts", "mcp"]
exclude = ["scripts/lib_loader.py"]
warn_return_any = false
warn_unused_ignores = true
ignore_missing_imports = true
no_implicit_optional = true
check_untyped_defs = true

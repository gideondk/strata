name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r dev-requirements.txt
      - name: ruff check
        run: ruff check scripts/ mcp/ tests/
      - name: mypy
        run: mypy scripts/ mcp/

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r dev-requirements.txt
      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage (3.13 only)
        if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  validate-plugin:
    name: claude plugin validate --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Validate manifest
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate . --strict
          else
            echo "::warning::claude CLI unavailable on runner — skipping validate"
          fi

  smoke:
    name: end-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bootstrap venv
        run: ./bin/bootstrap-venv.sh
      - name: Run smoke
        run: |
          set -euo pipefail
          ROOT="$(mktemp -d)"
          VAULT="$ROOT/vault"
          REPO="$ROOT/myrepo"
          mkdir -p "$VAULT" "$REPO"
          cd "$REPO"
          git init -q
          git config user.email ci@strata.local
          git config user.name CI
          git remote add origin https://example.invalid/test/myrepo.git
          git checkout -qb feat/ci-smoke
          echo x > a.md && git add . && git commit -qm i

          export CLAUDE_PROJECT_DIR="$REPO"
          export CLAUDE_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          export CLAUDE_PLUGIN_DATA="$ROOT/data"
          export STRATA_VAULT_PATH="$VAULT"

          "$CLAUDE_PLUGIN_ROOT/bin/run-python.sh" "$CLAUDE_PLUGIN_ROOT/scripts/init-memory.py"
          echo "Session note body" | \
            "$CLAUDE_PLUGIN_ROOT/bin/run-python.sh" "$CLAUDE_PLUGIN_ROOT/scripts/save-note.py" \
              --topic "smoke test"
          "$CLAUDE_PLUGIN_ROOT/bin/run-python.sh" "$CLAUDE_PLUGIN_ROOT/scripts/memory-lint.py" \
              --preset secrets,pii,phi-uk,phi-us,financial-iban
          "$CLAUDE_PLUGIN_ROOT/bin/run-python.sh" "$CLAUDE_PLUGIN_ROOT/scripts/review.py"
